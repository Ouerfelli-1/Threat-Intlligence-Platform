version: '3.8'

services:
  # PostgreSQL with TimescaleDB
  database:
    image: timescale/timescaledb:latest-pg15
    container_name: recon_database
    environment:
      POSTGRES_DB: recon_manager
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - recon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d recon_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Recon Manager API
  manager:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: recon_manager
    environment:
      DATABASE_URL: postgresql://recon:${DB_PASSWORD:-changeme}@database:5432/recon_manager
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-me}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - recon_network
    restart: unless-stopped
    volumes:
      - ./manager:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis for job queue
  redis:
    image: redis:7-alpine
    container_name: recon_redis
    ports:
      - "6379:6379"
    networks:
      - recon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Recon Engine (worker)
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: recon_engine
    environment:
      DATABASE_URL: postgresql://recon:${DB_PASSWORD:-changeme}@database:5432/recon_manager
      REDIS_URL: redis://redis:6379/0
      MANAGER_API_URL: http://manager:8000
    depends_on:
      - manager
      - redis
      - database
    networks:
      - recon_network
    restart: unless-stopped
    volumes:
      - ./engine:/app
      - recon_results:/app/results
    command: python worker.py

  # Scheduler (APScheduler service)
  scheduler:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: recon_scheduler
    environment:
      DATABASE_URL: postgresql://recon:${DB_PASSWORD:-changeme}@database:5432/recon_manager
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - manager
      - redis
    networks:
      - recon_network
    restart: unless-stopped
    volumes:
      - ./manager:/app
    command: python services/scheduler_service.py

  # Findings API (query results)
  findings:
    build:
      context: ./findings
      dockerfile: Dockerfile
    container_name: recon_findings
    environment:
      DATABASE_URL: postgresql://recon:${DB_PASSWORD:-changeme}@database:5432/recon_manager
    ports:
      - "8001:8001"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - recon_network
    restart: unless-stopped
    volumes:
      - ./findings:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: recon_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - recon_network
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

networks:
  recon_network:
    driver: bridge

volumes:
  postgres_data:
  recon_results:
  grafana_data:
