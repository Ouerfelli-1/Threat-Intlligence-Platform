[nmap]
# Nmap scanning configuration
# Scan type: 'fast' (common ports), 'default' (with scripts), 'full' (all 65535 ports)
scan_type = fast

# Custom port range (optional, leave empty for default based on scan_type)
# Examples: 22,80,443 or 1-1000 or 80,443,8000-9000
ports = 

# Number of parallel scan threads
threads = 5

# Scan timeout in seconds per host
timeout = 600

# Enable CVE lookup after scanning (true/false)
check_cves = true

[nvd]
# NVD (National Vulnerability Database) API configuration
