<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DomainWatch — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
    }

    .input-focus:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">DomainWatch</h1>
      <p class="text-slate-400">Monitor your domains in real-time</p>
    </div>

    <!-- Login Card -->
    <div class="bg-slate-900 border border-slate-700 rounded-lg p-8 shadow-xl">
      <h2 class="text-xl font-semibold text-white mb-6">Sign In</h2>

      <!-- Error Message -->
      {% if error %}
      <div class="mb-4 p-4 bg-red-500/10 border border-red-500/30 rounded text-red-400 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="post" class="space-y-4">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">
            Username
          </label>
          <input
            id="username"
            name="username"
            type="text"
            required
            class="input-focus w-full px-4 py-2.5 bg-slate-800 border border-slate-600 rounded text-white placeholder-slate-500 transition"
            placeholder="Enter username"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            required
            class="input-focus w-full px-4 py-2.5 bg-slate-800 border border-slate-600 rounded text-white placeholder-slate-500 transition"
            placeholder="Enter password"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full mt-6 py-2.5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-medium rounded transition duration-200 shadow-lg hover:shadow-xl"
        >
          Sign In
        </button>
      </form>

      <!-- Help Text -->
    </div>

    <!-- Footer -->
    <p class="text-center text-slate-500 text-xs mt-8">
      © 2024 DomainWatch. Secure domain monitoring platform.
    </p>
  </div>
</body>
</html>
