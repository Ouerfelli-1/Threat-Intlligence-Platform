<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DomainWatch — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0b0e14;color:#c9d1d9;height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:#0d1117;border:1px solid #21262d;width:340px;padding:32px}
    h1{font-size:16px;font-weight:700;color:#e6edf3;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:24px}
    .form-group{margin-bottom:16px}
    label{display:block;margin-bottom:6px;font-size:12px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
    input{width:100%;padding:10px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;font-size:14px;outline:none}
    input:focus{border-color:#58a6ff}
    button{width:100%;padding:10px;background:#238636;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    button:hover{background:#2ea043}
    .error{background:#3d1f1f;border:1px solid #da3633;color:#f85149;padding:8px 12px;font-size:13px;text-align:center;margin-bottom:16px}
    .hint{text-align:center;margin-top:16px;color:#484f58;font-size:12px}
  </style>
</head>
<body>
  <div class="login-box">
    <h1>DomainWatch</h1>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
      </div>
      <button type="submit">Sign In</button>
    </form>

    <div class="hint">Default: admin / admin123</div>
  </div>
</body>
</html>
