services:
  app:
    build: .
    container_name: domain-watcher
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database
      - ./data:/app/data
      # Mount config so you can edit it without rebuilding
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      # Set these on first run to create the initial admin account.
      # Remove or leave blank after the user has been created.
      - ADMIN_USERNAME=domainwatcher
      - ADMIN_PASSWORD=O/Q):6Oe6fs4|~^olVW8l"@"
