name: tip-platform

# Dev overlay: bind-mount packages so changes show up without rebuild, force auth disabled.
# Usage: docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up -d

services:
  postgres:
    ports:
      - "5432:5432"
  redis:
    ports:
      - "6379:6379"

  secrets:
    environment:
      DISABLE_AUTH: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ../packages:/app/packages
  auth:
    environment:
      DISABLE_AUTH: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ../packages:/app/packages
