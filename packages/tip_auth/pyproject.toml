[project]
name = "tip-auth"
version = "0.1.0"
description = "JWT validation middleware + permission dependencies"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "pyjwt[crypto]>=2.9",
    "tip-common",
]

[tool.uv.sources]
tip-common = { path = "../tip_common", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_auth"]
