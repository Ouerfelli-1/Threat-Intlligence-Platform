[project]
name = "tip-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas, indicator normalization, confidence config"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "idna>=3.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_schemas"]
