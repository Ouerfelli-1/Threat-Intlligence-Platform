[project]
name = "tip-db"
version = "0.1.0"
description = "Async SQLAlchemy base + session factory"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0,<3",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_db"]
