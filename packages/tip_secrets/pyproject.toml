[project]
name = "tip-secrets"
version = "0.1.0"
description = "Client for the secrets service (bootstrap-aware)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "tip-common",
    "tip-http",
]

[tool.uv.sources]
tip-common = { path = "../tip_common", editable = true }
tip-http = { path = "../tip_http", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_secrets"]
