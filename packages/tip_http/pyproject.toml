[project]
name = "tip-http"
version = "0.1.0"
description = "httpx-based HTTP client with retry, timeout, and circuit breaker"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "tip-common",
]

[tool.uv.sources]
tip-common = { path = "../tip_common", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_http"]
