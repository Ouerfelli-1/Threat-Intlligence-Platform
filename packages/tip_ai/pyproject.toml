[project]
name = "tip-ai"
version = "0.1.0"
description = "OpenRouter helper + ContextProvider protocol for AI insights"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "tip-common",
    "tip-http",
    "tip-schemas",
]

[tool.uv.sources]
tip-common = { path = "../tip_common", editable = true }
tip-http = { path = "../tip_http", editable = true }
tip-schemas = { path = "../tip_schemas", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_ai"]
