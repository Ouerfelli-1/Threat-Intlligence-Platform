[project]
name = "tip-ai"
version = "0.2.0"
description = "LiteLLM + OpenRouter chat clients + ContextProvider protocol for AI insights"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    # Note: the `litellm` SDK is intentionally NOT pulled in here. We talk to
    # the standalone LiteLLM proxy container over HTTP (see LiteLLMClient).
    # Keeping the SDK out trims ~200MB of transitive deps from every service
    # image and avoids the SDK's known issues with github/* model routing.
    "tip-common",
    "tip-http",
    "tip-schemas",
]

[tool.uv.sources]
tip-common = { path = "../tip_common", editable = true }
tip-http = { path = "../tip_http", editable = true }
tip-schemas = { path = "../tip_schemas", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tip_ai"]
